# epay-go/web/nginx.conf
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    # Use Docker DNS for dynamic backend resolution so frontend keeps working
    # after the backend container is recreated and gets a new IP.
    set $backend_upstream http://backend:8080;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 代理
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /submit.php {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /mapi.php {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api.php {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        # 区分 API 请求和前端路由
        # API 请求代理到后端
        if ($request_method != GET) {
            proxy_pass $backend_upstream;
        }

        # GET 请求如果是 API 也代理
        set $is_api 0;
        if ($uri ~ ^/admin/api/) {
            set $is_api 1;
        }
        if ($is_api = 1) {
            proxy_pass $backend_upstream;
        }

        # 其他 GET 请求返回前端页面
        try_files $uri $uri/ /index.html;
    }

    location /merchant/ {
        # 区分 API 请求和前端路由
        # API 请求代理到后端
        if ($request_method != GET) {
            proxy_pass $backend_upstream;
        }

        # GET 请求如果是 API 也代理
        set $is_api 0;
        if ($uri ~ ^/merchant/api/) {
            set $is_api 1;
        }
        if ($is_api = 1) {
            proxy_pass $backend_upstream;
        }

        # 其他 GET 请求返回前端页面
        try_files $uri $uri/ /index.html;
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }
}
